services:
  backend:
    build: ./backend
    ports:
      - "3004:8000"
    environment:
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - FRONTEND_URL=https://swole.project-prometheus.online
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3005:3000"
    depends_on:
      - backend
    restart: unless-stopped
